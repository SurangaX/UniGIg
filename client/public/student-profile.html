<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile – UniGig</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/dashboard.css" />
</head>
<body>
  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="dashboard-layout">

        <aside class="dash-sidebar">
          <div class="dash-sidebar__avatar">S</div>
          <div class="dash-sidebar__role">Student</div>
          <nav class="dash-nav" style="margin-top:var(--sp-6)">
            <a href="/student-dashboard.html">Dashboard</a>
            <a href="/student-applications.html">My Applications</a>
            <a href="/student-profile.html" class="active">Edit Profile</a>
            <a href="/jobs.html">Browse Jobs</a>
          </nav>
        </aside>

        <div>
          <h1 style="font-size:var(--fs-xl);font-weight:800;margin-bottom:var(--sp-6)">Edit Profile</h1>
          <div class="card" style="max-width:540px">
            <div class="card__body">
              <form id="profile-form" class="flex-col gap-4">
                <div class="form-group">
                  <label for="name">Full name</label>
                  <input type="text" id="name" name="name" required />
                </div>
                <div class="form-group">
                  <label for="uni">University</label>
                  <input type="text" id="uni" name="university_or_business" />
                </div>
                <div class="form-group">
                  <label for="skills">Skills (comma-separated)</label>
                  <input type="text" id="skills" name="skills"
                         placeholder="JavaScript, Design, Marketing" />
                </div>
                <button type="submit" class="btn btn--primary">Save Changes</button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><p>&copy; 2026 UniGig &ndash; Built for students, by students.</p></div>
  </footer>

  <script type="module" src="/js/pages/student-profile.js"></script>
</body>
</html>
