<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a New Job – UniGig</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/dashboard.css" />
</head>
<body>
  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="dashboard-layout">

        <aside class="dash-sidebar">
          <div class="dash-sidebar__avatar">E</div>
          <div class="dash-sidebar__role">Employer</div>
          <nav class="dash-nav" style="margin-top:var(--sp-6)">
            <a href="/employer-dashboard.html">Dashboard</a>
            <a href="/employer-jobs.html">My Jobs</a>
            <a href="/employer-new-job.html" class="active">Post a Job</a>
          </nav>
        </aside>

        <div>
          <h1 style="font-size:var(--fs-xl);font-weight:800;margin-bottom:var(--sp-6)">Post a New Job</h1>
          <div class="card" style="max-width:640px">
            <div class="card__body">
              <form id="new-job-form" class="flex-col gap-4" novalidate>

                <div class="form-group">
                  <label for="title">Job title *</label>
                  <input type="text" id="title" name="title" required placeholder="e.g. Junior Web Developer" />
                </div>

                <div class="form-group">
                  <label for="category">Category *</label>
                  <select id="category" name="category" required>
                    <option value="">Select a category…</option>
                    <option>Technology</option>
                    <option>Marketing</option>
                    <option>Administration</option>
                    <option>Food &amp; Beverage</option>
                    <option>Education</option>
                    <option>Design</option>
                    <option>Customer Service</option>
                    <option>Logistics</option>
                    <option>Other</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="description">Description *</label>
                  <textarea id="description" name="description" rows="6" required
                            placeholder="Describe the role, responsibilities, and requirements…"></textarea>
                </div>

                <div class="form-group">
                  <label for="location">Location *</label>
                  <input type="text" id="location" name="location" required placeholder="City or Remote" />
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
                  <div class="form-group">
                    <label for="pay_amount">Pay amount *</label>
                    <input type="number" id="pay_amount" name="pay_amount" min="0" step="0.5" required placeholder="15.00" />
                  </div>
                  <div class="form-group">
                    <label for="pay_type">Pay type *</label>
                    <select id="pay_type" name="pay_type" required>
                      <option value="hour">Per Hour</option>
                      <option value="day">Per Day</option>
                      <option value="job">Per Job</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label for="schedule_text">Schedule (optional)</label>
                  <input type="text" id="schedule_text" name="schedule_text"
                         placeholder="e.g. Weekends 9am-3pm, Flexible 10-15hrs/week" />
                </div>
                <div class="form-group">
                  <label for="workers_needed">Workers needed *</label>
                  <input type="number" id="workers_needed" name="workers_needed" min="1" step="1" value="1" required
                         placeholder="1" />
                  <span class="form-hint" style="font-size:var(--fs-xs);color:var(--clr-text-muted)">
                    The job closes automatically once this many applicants are accepted.
                  </span>
                </div>

                <div style="display:flex;gap:var(--sp-3)">
                  <button type="submit" class="btn btn--primary btn--lg">Post Job</button>
                  <a href="/employer-jobs.html" class="btn btn--ghost btn--lg">Cancel</a>
                </div>

              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><p>&copy; 2026 UniGig &ndash; Built for students, by students.</p></div>
  </footer>

  <script type="module" src="/js/pages/employer-new-job.js"></script>
</body>
</html>
