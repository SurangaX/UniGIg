<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Dashboard – UniGig</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/dashboard.css" />
  <link rel="stylesheet" href="/css/pages/review.css" />
</head>
<body>
  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside class="dash-sidebar">
          <div class="dash-sidebar__avatar" id="sidebar-avatar">E</div>
          <div class="dash-sidebar__name" id="sidebar-name">Employer</div>
          <div class="dash-sidebar__role">Employer</div>
          <p class="text-muted text-center" style="font-size:var(--fs-xs)" id="sidebar-biz"></p>
          <nav class="dash-nav" style="margin-top:var(--sp-6)">
            <a href="/employer-dashboard.html" class="active">Dashboard</a>
            <a href="/employer-jobs.html">My Jobs</a>
            <a href="/employer-new-job.html">Post a Job</a>
          </nav>
          <div style="margin-top:var(--sp-6);display:flex;flex-direction:column;gap:var(--sp-2)">
            <button id="btn-edit-account" class="btn btn--outline btn--sm" style="width:100%">Edit Account</button>
            <button id="btn-delete-account" class="btn btn--sm" style="width:100%;background:var(--clr-error,#e53e3e);color:#fff;border:none">Delete Account</button>
          </div>
        </aside>

        <!-- Main -->
        <div>
          <h1 style="font-size:var(--fs-xl);font-weight:800;margin-bottom:var(--sp-6)">Employer Dashboard</h1>

          <div class="stats-row mb-8">
            <div class="stat-card">
              <div class="stat-card__value" id="stat-jobs">—</div>
              <div class="stat-card__label">Total Jobs</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__value" id="stat-open">—</div>
              <div class="stat-card__label">Open</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__value" id="stat-apps">—</div>
              <div class="stat-card__label">Applications</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__value" id="stat-rating">—</div>
              <div class="stat-card__label">Avg. Rating</div>
            </div>
          </div>

          <div class="dash-section">
            <h2>
              Recent Jobs
              <a href="/employer-new-job.html" class="btn btn--primary btn--sm">+ Post Job</a>
            </h2>
            <div id="recent-jobs">
              <div class="skeleton" style="height:72px;margin-bottom:8px"></div>
              <div class="skeleton" style="height:72px;margin-bottom:8px"></div>
            </div>
          </div>

          <div class="dash-section">
            <h2>Reviews Received</h2>
            <div id="reviews-list">
              <div class="skeleton" style="height:80px;margin-bottom:8px"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><p>&copy; 2026 UniGig &ndash; Built for students, by students.</p></div>
  </footer>

  <script type="module" src="/js/pages/employer-dashboard.js"></script>

  <!-- Edit Account Modal -->
  <div id="edit-account-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal">
      <h2 id="edit-modal-title">Edit Account Details</h2>
      <form id="edit-account-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="edit-name">Full Name</label>
          <input class="form-input" type="text" id="edit-name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-email">Email</label>
          <input class="form-input" type="email" id="edit-email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-business">Business Name</label>
          <input class="form-input" type="text" id="edit-business" />
        </div>
        <hr style="margin:var(--sp-4) 0;border-color:var(--clr-border)" />
        <p style="font-size:var(--fs-sm);color:var(--clr-text-muted);margin-bottom:var(--sp-3)">Leave password fields blank to keep your current password.</p>
        <div class="form-group">
          <label class="form-label" for="edit-current-password">Current Password</label>
          <input class="form-input" type="password" id="edit-current-password" autocomplete="current-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-new-password">New Password</label>
          <input class="form-input" type="password" id="edit-new-password" autocomplete="new-password" />
        </div>
        <div id="edit-error" style="color:var(--clr-error,#e53e3e);font-size:var(--fs-sm);margin-bottom:var(--sp-2);display:none"></div>
        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="edit-cancel">Cancel</button>
          <button type="submit" class="btn btn--primary" id="edit-submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
