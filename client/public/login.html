<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – UniGig</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/auth.css" />
</head>
<body>
  <div id="navbar"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome back 👋</h1>
      <p class="subtitle">Log in to your UniGig account</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" autocomplete="email"
                 placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>
        <div id="inline-error" style="display:none" class="form-error" role="alert"></div>
        <button type="submit" class="btn btn--primary btn--lg w-full">Log In</button>
      </form>

      <!-- Shown only when login fails with 'not found' signal -->
      <div id="signup-banner" class="signup-banner" style="display:none;padding: 10px;" role="alert" aria-live="polite">
        <div class="signup-banner__icon">🚀</div>
        <div class="signup-banner__title">Looks like you're new here!</div>
        <div class="signup-banner__sub">No account found for that email. Join UniGig for free in seconds.</div>
        <a href="/register.html" class="btn btn--signup">Create your free account →</a>
      </div>

      <p class="auth-footer" id="auth-footer-link">
        <b>New to UniGig? <a href="/register.html">Sign up free</a></b>
      </p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container"><p>&copy; 2026 UniGig &ndash; Built for students, by students.</p></div>
  </footer>

  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
