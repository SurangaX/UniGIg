<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard – UniGig</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/dashboard.css" />
  <link rel="stylesheet" href="/css/pages/review.css" />
</head>
<body>
  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside class="dash-sidebar">
          <div class="dash-sidebar__avatar" id="sidebar-avatar">S</div>
          <div class="dash-sidebar__name" id="sidebar-name">Student</div>
          <div class="dash-sidebar__role">Student</div>
          <p class="text-muted text-center" style="font-size:var(--fs-xs)" id="sidebar-uni"></p>
          <nav class="dash-nav" style="margin-top:var(--sp-6)">
            <a href="/student-dashboard.html" class="active">Dashboard</a>
            <a href="/student-applications.html">My Applications</a>
            <a href="/student-profile.html">Edit Profile</a>
            <a href="/jobs.html">Browse Jobs</a>
          </nav>
        </aside>

        <!-- Main content -->
        <div>
          <h1 style="font-size:var(--fs-xl);font-weight:800;margin-bottom:var(--sp-6)">My Dashboard</h1>

          <!-- Stats -->
          <div class="stats-row mb-8">
            <div class="stat-card">
              <div class="stat-card__value" id="stat-applications">—</div>
              <div class="stat-card__label">Applications</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__value" id="stat-accepted">—</div>
              <div class="stat-card__label">Accepted</div>
            </div>
            <div class="stat-card">
              <div class="stat-card__value" id="stat-rating">—</div>
              <div class="stat-card__label">Avg. Rating</div>
            </div>
          </div>

          <!-- Recent applications -->
          <div class="dash-section">
            <h2>
              Recent Applications
              <a href="/student-applications.html" class="btn btn--ghost btn--sm">View all</a>
            </h2>
            <div id="recent-apps">
              <div class="skeleton" style="height:72px;margin-bottom:8px"></div>
              <div class="skeleton" style="height:72px;margin-bottom:8px"></div>
            </div>
          </div>

          <!-- Reviews -->
          <div class="dash-section">
            <h2>Reviews Received</h2>
            <div id="reviews-list">
              <div class="skeleton" style="height:80px;margin-bottom:8px"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><p>&copy; 2026 UniGig &ndash; Built for students, by students.</p></div>
  </footer>

  <script type="module" src="/js/pages/student-dashboard.js"></script>
</body>
</html>
