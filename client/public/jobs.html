<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs – UniGig</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/jobs.css" />
</head>
<body>
  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="jobs-layout">

        <!-- Filter panel -->
        <aside class="filter-panel">
          <h2>Filters</h2>
          <form id="filter-form" class="flex-col gap-4">
            <div class="form-group">
              <label for="f-search">Search</label>
              <input type="text" id="f-search" name="search" placeholder="Job title or keyword…" />
            </div>
            <div class="form-group">
              <label for="f-category">Category</label>
              <select id="f-category" name="category">
                <option value="">All categories</option>
                <option>Technology</option>
                <option>Marketing</option>
                <option>Administration</option>
                <option>Food &amp; Beverage</option>
                <option>Education</option>
                <option>Design</option>
                <option>Customer Service</option>
                <option>Logistics</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="f-location">Location</label>
              <input type="text" id="f-location" name="location" placeholder="City or Remote…" />
            </div>
            <div class="form-group">
              <label for="f-pay-min">Min Pay ($)</label>
              <input type="number" id="f-pay-min" name="payMin" min="0" step="0.5" placeholder="0" />
            </div>
            <div class="form-group">
              <label for="f-pay-max">Max Pay ($)</label>
              <input type="number" id="f-pay-max" name="payMax" min="0" step="0.5" placeholder="Any" />
            </div>
            <button type="submit" class="btn btn--primary">Apply Filters</button>
            <button type="button" id="clear-filters" class="btn btn--ghost">Clear</button>
          </form>
        </aside>

        <!-- Job list -->
        <section>
          <div class="jobs-header">
            <h1>Available Jobs</h1>
            <span class="jobs-count" id="jobs-count"></span>
          </div>
          <div class="grid-2" id="jobs-grid"></div>
        </section>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><p>&copy; 2026 UniGig &ndash; Built for students, by students.</p></div>
  </footer>

  <script type="module" src="/js/pages/jobs.js"></script>
</body>
</html>
